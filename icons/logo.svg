<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2420"/>
      <stop offset="100%" style="stop-color:#0F1410"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3DCC78"/>
      <stop offset="100%" style="stop-color:#1E9E54"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DF0A0"/>
      <stop offset="100%" style="stop-color:#3DCC78"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle background glow top-center -->
  <ellipse cx="256" cy="140" rx="200" ry="140" fill="#3DCC78" opacity="0.06"/>
  <!-- Bottom right accent -->
  <ellipse cx="400" cy="400" rx="160" ry="120" fill="#7C3AED" opacity="0.05"/>

  <!-- ── MAIN MARK: Stylized leaf/arrow coin ── -->
  <!-- Outer ring (coin shape) -->
  <circle cx="256" cy="248" r="152" fill="none" stroke="#3DCC78" stroke-width="5" opacity="0.18"/>
  <circle cx="256" cy="248" r="140" fill="none" stroke="#3DCC78" stroke-width="2" opacity="0.10"/>

  <!-- Inner circle bg -->
  <circle cx="256" cy="248" r="128" fill="#1A2018" opacity="0.8"/>

  <!-- ── LETTER S (stylized) ── -->
  <!-- Top curve of S -->
  <path d="M 220 188 Q 220 162 248 162 Q 295 162 295 192 Q 295 222 256 230 Q 218 238 218 268 Q 218 304 256 304 Q 294 304 294 278"
        fill="none" stroke="url(#green)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#softglow)"/>

  <!-- ── UPWARD TREND LINE through S ── -->
  <!-- Rising line (money growth symbol) -->
  <polyline points="176,310 214,270 244,290 292,238 336,202"
            fill="none" stroke="url(#accent)" stroke-width="8"
            stroke-linecap="round" stroke-linejoin="round"
            opacity="0.9" filter="url(#softglow)"/>

  <!-- Arrowhead at trend line end -->
  <polygon points="336,202 318,196 324,214"
           fill="#5DF0A0" opacity="0.9"/>

  <!-- Dots on trend line (data points) -->
  <circle cx="214" cy="270" r="5" fill="#5DF0A0" opacity="0.8"/>
  <circle cx="244" cy="290" r="5" fill="#5DF0A0" opacity="0.8"/>
  <circle cx="292" cy="238" r="5" fill="#5DF0A0" opacity="0.8"/>

  <!-- ── PESO/DOLLAR HORIZONTAL LINES ── -->
  <line x1="228" y1="196" x2="284" y2="196" stroke="#3DCC78" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <line x1="222" y1="214" x2="290" y2="214" stroke="#3DCC78" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

  <!-- Bottom wordmark area separator -->
  <line x1="80" y1="405" x2="432" y2="405" stroke="#3DCC78" stroke-width="1" opacity="0.12"/>

  <!-- WORDMARK: SpendWise -->
  <!-- S -->
  <text x="82" y="446" font-family="Georgia,serif" font-size="52" font-weight="700"
        fill="#F7F4EF" letter-spacing="-1">Spend</text>
  <text x="246" y="446" font-family="Georgia,serif" font-size="52" font-weight="700"
        fill="#3DCC78" letter-spacing="-1">Wise</text>

  <!-- Small tagline -->
  <text x="256" y="470" font-family="Arial,sans-serif" font-size="16" font-weight="400"
        fill="#F7F4EF" opacity="0.3" text-anchor="middle" letter-spacing="3">MONEY TRACKER</text>
</svg>